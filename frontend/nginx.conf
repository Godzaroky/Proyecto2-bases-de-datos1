server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Necesario para React Router — todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend para evitar problemas de CORS en producción
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
